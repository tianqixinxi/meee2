included:
  - Sources
  - App
  - plugins-builtin/Sources
  - meee2-plugin-kit/Sources

excluded:
  - .build
  - dist
  - Tests/Fixtures

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - nesting

opt_in_rules:
  - force_unwrapping

line_length:
  warning: 200
  error: 300

custom_rules:
  no_hardcoded_user_paths:
    name: "No Hardcoded User Paths"
    regex: '"/Users/[a-zA-Z]+'
    message: "Do not hardcode user paths. Use Bundle.main, NSHomeDirectory(), or FileManager."
    severity: error
