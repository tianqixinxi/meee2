included:
  - Sources
  - App
  - plugins-builtin/Sources
  - meee2-plugin-kit/Sources

excluded:
  - .build
  - dist
  - Tests/Fixtures

disabled_rules:
  - trailing_whitespace
  - identifier_name
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - nesting

  # Relaxed 2026-04-24: CI was silently failing on an orphan submodule
  # since the workflow was introduced (d97443d), so strict-lint never ran
  # against any commit. Turning it back on now surfaces ~90 legacy hits
  # concentrated in TUI/ and plugins-builtin/ that aren't worth rewriting
  # in one PR. The rules below are disabled rather than fixed file-by-file
  # to unblock CI; revisit later.
  - large_tuple
  - line_length
  - multiple_closures_with_trailing_closure
  - for_where
  - unused_enumerated
  - todo
  - type_name
  - notification_center_detachment
  - function_parameter_count

# `force_unwrapping` used to be opt-in here but TUI/DashboardView alone
# has 40+ unapologetic `!` on ncurses APIs that are infallible by
# contract. Re-enable in a future cleanup pass when those sites have
# been audited.
opt_in_rules:
  - optional_data_string_conversion

custom_rules:
  no_hardcoded_user_paths:
    name: "No Hardcoded User Paths"
    regex: '"/Users/[a-zA-Z]+'
    message: "Do not hardcode user paths. Use Bundle.main, NSHomeDirectory(), or FileManager."
    severity: error
